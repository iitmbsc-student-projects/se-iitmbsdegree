name: Suggest a Resource
description: Recommend a book, paper, article, blog, podcast, or tool
title: "[Resource] "
labels: ["resource-suggestion"]
body:
  - type: dropdown
    id: resource-type
    attributes:
      label: Resource type
      options:
        - Book
        - Academic Paper
        - Article / Blog Post
        - Newsletter
        - Podcast
        - Video / YouTube Channel
        - Tool / Platform
    validations:
      required: true

  - type: input
    id: resource-name
    attributes:
      label: Resource name
      placeholder: "e.g. Clean Code by Robert C. Martin"
    validations:
      required: true

  - type: input
    id: resource-link
    attributes:
      label: Link
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: SE topic area
      options:
        - Software Design & Architecture
        - Testing & Quality Assurance
        - Agile & Project Management
        - DevOps & CI/CD
        - Requirements Engineering
        - General Software Engineering
        - Career & Professional Development
        - Other
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this resource valuable?
      placeholder: "1-2 sentences on why this would help SE students or practitioners"
    validations:
      required: true
